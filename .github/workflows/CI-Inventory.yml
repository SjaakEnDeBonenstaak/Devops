name: Inventory — Test & Lint

on:
  push:
    paths:
      - 'inventory-service/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    defaults:
      run:
        working-directory: ./inventory-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inventory-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: ./inventory-service
          test-script: npm test
          output: report-markdown
