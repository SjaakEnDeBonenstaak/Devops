global:
  smtp_smarthost: 'smtp.sendgrid.net:587'
  smtp_from: '${ALERT_FROM_EMAIL}'
  smtp_auth_username: 'apikey'
  smtp_auth_password: '${SENDGRID_API_KEY}'

route:
  receiver: 'email'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: 'email'
    email_configs:
      - to: '${ALERT_TO_EMAIL}'
        send_resolved: true
